<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animaciones Prototipo - Xemotional</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* UI overlay */
        .ui { position: absolute; z-index: 10; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 50px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .btn { padding: 10px 20px; background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 30px; cursor: pointer; font-size: 14px; font-weight: 600; transition: 0.3s; }
        .btn:hover { background: rgba(255,255,255,0.1); }
        .btn.active { background: #0078d4; border-color: #0078d4; box-shadow: 0 0 15px rgba(0,120,212,0.6); }
        
        .header { position: absolute; top: 30px; left: 30px; z-index: 10; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -1px; }
        .header p { margin: 5px 0 0; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="title">Animación 1: Océano de Frecuencia 3D</h1>
        <p id="desc">Terreno topográfico de puntos que reacciona como una onda de voz masiva.</p>
    </div>

    <div class="ui">
        <button class="btn active" onclick="setAnim(1)">1. Océano 3D</button>
        <button class="btn" onclick="setAnim(2)">2. HUD Jarvis Core</button>
        <button class="btn" onclick="setAnim(3)">3. Matrix de Voz (Flujo)</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let currentAnim = 1;
        let time = 0;
        let animationFrame;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // ════════════════════════════════════════════════
        // ANIM 1: 3D TERRAIN WAVE (Océano de Frecuencia)
        // ════════════════════════════════════════════════
        const terrain = {
            cols: 55, rows: 35, size: 30, points: []
        };
        function initTerrain() {
            terrain.points = [];
            for (let z = 0; z < terrain.rows; z++) {
                for (let x = 0; x < terrain.cols; x++) {
                    terrain.points.push({ x: x - terrain.cols/2, z: z - terrain.rows/2 });
                }
            }
        }
        initTerrain();

        function drawTerrain() {
            ctx.fillStyle = '#050a15';
            ctx.fillRect(0, 0, W, H);
            
            const focalLength = 400;
            const camZ = 35;
            const camY = -12;

            ctx.save();
            ctx.translate(W/2, H/2 + 100);

            for (let i = 0; i < terrain.points.length; i++) {
                let p = terrain.points[i];
                
                // Math wave
                let dist = Math.sqrt(p.x*p.x + p.z*p.z);
                let y = Math.sin(dist * 0.4 - time * 0.05) * 4 + Math.cos(p.x * 0.3 + time*0.02) * 2;
                // Add center spike (voice analysis)
                let cDist = Math.max(0, 10 - dist);
                y -= cDist * Math.sin(time*0.1) * 2;

                // 3D projection
                let pz = p.z + camZ;
                if (pz <= 0) continue;
                
                let scale = focalLength / pz;
                let px = p.x * terrain.size * scale;
                let py = (y + camY) * terrain.size * scale;
                
                let alpha = Math.min(1, scale * 0.8);
                let hue = 200 + y * 15;

                ctx.beginPath();
                ctx.arc(px, py, scale * 1.5, 0, Math.PI*2);
                ctx.fillStyle = `hsla(${hue}, 100%, 60%, ${alpha})`;
                ctx.fill();
            }
            ctx.restore();
        }

        // ════════════════════════════════════════════════
        // ANIM 2: HUD JARVIS CORE (Análisis de Datos Futurista)
        // ════════════════════════════════════════════════
        const arcs = [];
        for(let i=0; i<15; i++) {
            arcs.push({
                radius: 50 + i*25,
                angle: Math.random() * Math.PI*2,
                speed: (Math.random() - 0.5) * 0.04,
                width: 1 + Math.random() * 8,
                length: 0.2 + Math.random() * 1.5,
                alpha: 0.1 + Math.random() * 0.8,
                dash: Math.random() > 0.5 ? [5 + Math.random()*20, 5 + Math.random()*20] : []
            });
        }

        function drawHud() {
            ctx.fillStyle = '#02050a';
            ctx.fillRect(0, 0, W, H);
            
            ctx.save();
            ctx.translate(W/2, H/2);

            // Core glow
            let corePulse = 0.5 + Math.sin(time * 0.1) * 0.5;
            const grad = ctx.createRadialGradient(0,0,0, 0,0, 300);
            grad.addColorStop(0, `rgba(0, 164, 239, ${0.1 + corePulse*0.1})`);
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.fillRect(-W,-H,W*2,H*2);

            // Rings
            for (let i = 0; i < arcs.length; i++) {
                let a = arcs[i];
                a.angle += a.speed;
                
                ctx.beginPath();
                ctx.arc(0, 0, a.radius, a.angle, a.angle + a.length);
                ctx.lineWidth = a.width;
                if (a.dash.length) ctx.setLineDash(a.dash);
                else ctx.setLineDash([]);
                
                // Color flash
                let flash = Math.random() > 0.98 ? 1 : a.alpha;
                ctx.strokeStyle = `rgba(0, ${150 + Math.random()*105}, 255, ${flash})`;
                ctx.stroke();
            }

            // Central Voice Analyzer Bars
            ctx.setLineDash([]);
            for(let i=0; i<36; i++) {
                let ang = (i/36) * Math.PI*2;
                let h = 20 + Math.random() * (40 + corePulse*60);
                
                let x1 = Math.cos(ang) * 40;
                let y1 = Math.sin(ang) * 40;
                let x2 = Math.cos(ang) * (40 + h);
                let y2 = Math.sin(ang) * (40 + h);
                
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.lineWidth = 3;
                ctx.strokeStyle = `rgba(37, 211, 102, ${0.4 + Math.random()*0.6})`;
                ctx.stroke();
            }
            
            ctx.restore();
        }

        // ════════════════════════════════════════════════
        // ANIM 3: MATRIX VECTOR FLOW (Flujo de Voz Digital)
        // ════════════════════════════════════════════════
        const flowParticles = [];
        for(let i=0; i<1500; i++) {
            flowParticles.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                vx: 0, vy: 0,
                hue: 180 + Math.random()*60
            });
        }

        function drawFlow() {
            ctx.fillStyle = 'rgba(0, 2, 5, 0.15)'; // trailing effect
            ctx.fillRect(0, 0, W, H);

            for(let i=0; i<flowParticles.length; i++) {
                let p = flowParticles[i];
                
                // Flow field math (pseudo Perlin noise)
                let angle = Math.sin(p.x * 0.005 + time*0.01) * Math.cos(p.y * 0.005 + time*0.01) * Math.PI * 2;
                
                // Audio force at center
                let dx = W/2 - p.x;
                let dy = H/2 - p.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < 300) {
                    let force = (300 - dist) * 0.0005;
                    angle += Math.atan2(dy, dx) * force;
                }

                p.vx += Math.cos(angle) * 0.5;
                p.vy += Math.sin(angle) * 0.5;
                
                // limit speed
                let speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
                if(speed > 4) {
                    p.vx = (p.vx/speed) * 4;
                    p.vy = (p.vy/speed) * 4;
                }
                
                p.x += p.vx;
                p.y += p.vy;

                // Wrap
                if(p.x < 0) p.x = W;
                if(p.x > W) p.x = 0;
                if(p.y < 0) p.y = H;
                if(p.y > H) p.y = 0;

                ctx.beginPath();
                ctx.arc(p.x, p.y, 1.2, 0, Math.PI*2);
                ctx.fillStyle = `hsla(${p.hue}, 100%, 60%, ${speed/4 + 0.2})`;
                ctx.fill();
            }
        }

        // Main Loop
        function animate() {
            time++;
            if (currentAnim === 1) drawTerrain();
            else if (currentAnim === 2) drawHud();
            else if (currentAnim === 3) drawFlow();

            animationFrame = requestAnimationFrame(animate);
        }
        animate();

        // UI Logic
        window.setAnim = function(idx) {
            currentAnim = idx;
            document.querySelectorAll('.btn').forEach((b, i) => {
                b.classList.toggle('active', i+1 === idx);
            });
            
            const title = document.getElementById('title');
            const desc = document.getElementById('desc');
            
            if(idx === 1) {
                title.textContent = "Animación 1: Océano de Frecuencia 3D";
                desc.textContent = "Terreno topográfico de puntos que reacciona como una onda de voz masiva.";
                ctx.fillStyle='#050a15'; ctx.fillRect(0,0,W,H);
            } else if(idx === 2) {
                title.textContent = "Animación 2: HUD Jarvis Inteligente";
                desc.textContent = "Anillos de datos orbitales concentrados en el análisis forense.";
                ctx.fillStyle='#02050a'; ctx.fillRect(0,0,W,H);
            } else if(idx === 3) {
                title.textContent = "Animación 3: Matrix de Voz (Vector Flow)";
                desc.textContent = "Miles de partículas simulando la red neuronal analizando audio.";
                ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
                // Randomize positions on switch to avoid clumping
                flowParticles.forEach(p => { p.x = Math.random()*W; p.y = Math.random()*H; });
            }
        };
    </script>
</body>
</html>
